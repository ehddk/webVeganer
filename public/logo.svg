<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f855a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- "Veg" in green -->
  <text x="20" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#48bb78">
    Veg
  </text>
  
  <!-- "an" in gray -->
  <text x="160" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#1f2937">
    an
  </text>
  
  <!-- "er" with gradient -->
  <text x="260" y="100" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="url(#greenGradient)">
    er
  </text>
  
  <!-- Leaf emoji/icon -->
  <text x="350" y="50" font-size="50">🌿</text>
</svg>
